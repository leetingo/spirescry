name: Unit tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run C# unit tests
        run: dotnet run --project tests/UnitTests/UnitTests.csproj

      - name: Check protocol artifact
        run: bash tests/protocol_artifact_test.sh

      - name: Run Python unit tests
        run: |
          python3 tests/protocol_contract_test.py
          python3 tests/projection_schema_drift_test.py
          python3 tests/world_walker_test.py
          python3 tests/build_identity_test.py

      - name: Run CLI unit tests
        run: cargo test --manifest-path cli/Cargo.toml

      - name: Run build stop tests
        run: tests/build_stop_test.sh

      - name: Run play skill pre-flight tests
        run: tests/play_skill_preflight_test.sh
