name: Host CI

# Integration against the pure .NET host (the dll boot: no game binary,
# no Steam at runtime). The host is built from the game's own dlls,
# which are not distributable — so these jobs need a self-hosted runner
# on a machine with Slay the Spire 2 installed (macOS auto-detects the
# install; elsewhere set STS2_GAME_DIR on the runner).
#
# Runner requirements: labels [self-hosted, sts2], plus .NET 9, Rust,
# and python3 on PATH. One job at a time per machine (the default for a
# single runner) — the suite owns port 7779 for its lifetime.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *" # nightly full sweep, UTC

jobs:
  host-suite:
    name: Host suite (dll boot)
    if: github.event_name != 'schedule'
    runs-on: [self-hosted, sts2]
    timeout-minutes: 30
    concurrency:
      group: host-suite-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - name: Build host from the game install
        run: ./build.sh headless-setup

      - name: Build CLI
        run: ./build.sh cli

      - name: Run the suite
        env:
          STS2_AGENT_PORT: "7779"
          SPIRESCRY_BIN: cli/target/release/spirescry
        run: python3 tests/ci.py --boot --keys-out host-keys.json --log host-ci.log

      - name: Upload host log + key sets
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: host-suite-${{ github.run_id }}
          path: |
            host-ci.log
            host-keys.json
          if-no-files-found: ignore

  nightly-sweep:
    name: Nightly suite + event sweep
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, sts2]
    timeout-minutes: 90
    concurrency:
      group: nightly-sweep
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Build host from the game install
        run: ./build.sh headless-setup

      - name: Build CLI
        run: ./build.sh cli

      - name: Run the suite + eventsweep
        env:
          STS2_AGENT_PORT: "7779"
          SPIRESCRY_BIN: cli/target/release/spirescry
        run: python3 tests/ci.py --boot --sweep --keys-out host-keys.json --log host-ci.log

      - name: Upload host log + key sets
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-sweep-${{ github.run_id }}
          path: |
            host-ci.log
            host-keys.json
          if-no-files-found: ignore
